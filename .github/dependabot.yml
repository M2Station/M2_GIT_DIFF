# Dependabot 設定：偵測到新版本時自動開 PR 更新
# 文件：https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # ── npm 套件（package.json / package-lock.json）─────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Taipei"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(dev-deps)"
    # 分組策略：
    #  1) 互相有 peer 相依、必須一起升級的工具鏈（Vite / Vitest、Electron）
    #     連同 major 一起分組，避免拆開單獨升級造成 ERESOLVE peer 衝突。
    #  2) 其餘套件的 minor / patch 合併成單一 PR，減少雜訊。
    #  3) 其餘套件的 major（可能有破壞性變更）維持各自獨立開 PR 方便審查。
    groups:
      # Vite 與 Vitest 生態的 peer 版本互相綁定，必須同時升級。
      vite-vitest-toolchain:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vitest"
          - "@vitest/*"
        update-types:
          - "minor"
          - "patch"
          - "major"
      # Electron 本體與原生模組重建工具一起升級。
      electron:
        patterns:
          - "electron"
          - "@electron/*"
        update-types:
          - "minor"
          - "patch"
          - "major"
      # React 與 React DOM 版本必須一致，一起升級（避免 react-dom 的 peer 衝突）。
      react:
        patterns:
          - "react"
          - "react-dom"
        update-types:
          - "minor"
          - "patch"
          - "major"
      # 其餘套件只把 minor / patch 併成一個 PR（major 仍各自獨立）。
      npm-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    # 暫時凍結 electron-builder（維持在 26.14.0）：
    # 經二分測試確認 eb 26.15.0 是第一個會壞的版本，26.14.0 仍正常。
    # 26.14.0 與 26.15.0 產生的 M2_GIT_DIFF.exe 位元組完全相同，故觸發點不是
    # 主程式本身，而是 26.15.0 改版後的 NSIS 安裝程式（app-builder-bin 被完全移除）：
    # Windows Defender 雲端「首見即封鎖」在安裝當下把主程式誤判移除，安裝完卻無法啟動。
    # 因 26.14 → 26.15 屬 minor 升級，這裡同時凍結 minor 與 major；待安裝檔完成
    # Authenticode 程式碼簽章後即可移除此項並升回最新版。
    ignore:
      - dependency-name: "electron-builder"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"

  # ── GitHub Actions（.github/workflows/*.yml）──────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Taipei"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions:
        update-types:
          - "minor"
          - "patch"
