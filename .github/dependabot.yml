# Dependabot 設定：偵測到新版本時自動開 PR 更新
# 文件：https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # ── npm 套件（package.json / package-lock.json）─────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Taipei"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(dev-deps)"
    # 分組策略：
    #  1) 互相有 peer 相依、必須一起升級的工具鏈（Vite / Vitest、Electron）
    #     連同 major 一起分組，避免拆開單獨升級造成 ERESOLVE peer 衝突。
    #  2) 其餘套件的 minor / patch 合併成單一 PR，減少雜訊。
    #  3) 其餘套件的 major（可能有破壞性變更）維持各自獨立開 PR 方便審查。
    groups:
      # Vite 與 Vitest 生態的 peer 版本互相綁定，必須同時升級。
      vite-vitest-toolchain:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vitest"
          - "@vitest/*"
        update-types:
          - "minor"
          - "patch"
          - "major"
      # Electron 本體與原生模組重建工具一起升級。
      electron:
        patterns:
          - "electron"
          - "@electron/*"
        update-types:
          - "minor"
          - "patch"
          - "major"
      # React 與 React DOM 版本必須一致，一起升級（避免 react-dom 的 peer 衝突）。
      react:
        patterns:
          - "react"
          - "react-dom"
        update-types:
          - "minor"
          - "patch"
          - "major"
      # 其餘套件只把 minor / patch 併成一個 PR（major 仍各自獨立）。
      npm-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # ── GitHub Actions（.github/workflows/*.yml）──────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Taipei"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions:
        update-types:
          - "minor"
          - "patch"
