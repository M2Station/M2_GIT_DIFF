name: License Header Check

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  license-header:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Need history so we can diff against the base commit.
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: Determine changed files
        id: changed
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi
          # Fall back to checking every tracked file (emit no file list) whenever
          # we can't compute a reliable diff:
          #   * empty / all-zero BASE -> first push of a brand-new branch
          #   * BASE commit missing   -> a force-push / rebase (e.g. Dependabot)
          #                              left github.event.before pointing at a
          #                              dangling commit, so `git diff` would
          #                              abort with "fatal: bad object".
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "files=" >> "$GITHUB_OUTPUT"
            echo "Base is empty/new branch -> will check ALL tracked files."
          elif ! git cat-file -e "$BASE^{commit}" 2>/dev/null; then
            echo "files=" >> "$GITHUB_OUTPUT"
            echo "Base commit $BASE not found (force-push/rebase?) -> will check ALL tracked files."
          else
            FILES=$(git diff --name-only --diff-filter=ACMR "$BASE" "$HEAD" | tr '\n' ' ')
            echo "files=$FILES" >> "$GITHUB_OUTPUT"
            echo "Changed files: $FILES"
          fi

      - name: Verify MIT license headers
        run: node scripts/check-license-headers.mjs ${{ steps.changed.outputs.files }}
