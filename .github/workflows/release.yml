name: Release

# Triggered when a version tag (vX.Y.Z) is pushed. Builds the Windows
# installer and publishes a GitHub Release with the artifact attached.
# This is the CI-native equivalent of the publish step in
# scripts/release.ps1 (`gh release create`).

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.3)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer (vite)
        run: npm run build

      - name: Rebuild native modules (better-sqlite3)
        run: npm run rebuild

      - name: Build installer (electron-builder)
        # The dist script already passes `--publish never` to each per-arch
        # electron-builder invocation, so this step only packages the
        # artifacts. Publishing is handled by the dedicated "Publish GitHub
        # Release" step below.
        #
        # Do NOT append another `-- --publish never` here: npm would add it to
        # the last invocation in the chain, giving it `--publish` twice. A
        # duplicated flag is parsed as an array (["never","never"]) which
        # electron-builder no longer treats as "never", so it auto-publishes on
        # the tag and fails with "GitHub Personal Access Token is not set".
        run: npm run dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: M2_GIT_DIFF ${{ github.ref_name }}
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
