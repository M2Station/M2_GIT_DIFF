name: Release

# Triggered when a version tag (vX.Y.Z) is pushed. Builds the Windows
# installer and publishes a GitHub Release with the artifact attached.
# This is the CI-native equivalent of the publish step in
# scripts/release.ps1 (`gh release create`).

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.3)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      # Cache electron-builder's downloaded tooling to speed up the release build.
      - name: Cache electron-builder downloads
        uses: actions/cache@v6
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-builder-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-builder-

      - name: Install dependencies
        run: npm ci

      - name: Build renderer (vite)
        run: npm run build

      - name: Build installer (electron-builder)
        # --publish never: build the multi-arch NSIS installers (x64 + arm64)
        # locally only; the "Publish GitHub Release" step below uploads them.
        # Without this, electron-builder auto-detects the tag and tries to
        # publish itself, failing because GH_TOKEN isn't set in this step.
        # NOTE: dist is a single electron-builder invocation, so --publish never
        # is applied exactly once (no duplicate-flag array problem).
        run: npm run dist -- --publish never

      - name: Generate SHA256 checksums
        # Hash each published installer so users can verify their download is
        # intact and untampered (Get-FileHash on Windows, or
        # `sha256sum -c SHA256SUMS.txt` on Git Bash / Linux / macOS). Non-recursive
        # on purpose: only the top-level NSIS installers in release/ are hashed,
        # matching exactly what the publish step uploads. The two-space separator
        # is the standard sha256sum format.
        shell: pwsh
        run: |
          $lines = Get-ChildItem release -Filter *.exe | ForEach-Object {
            "{0}  {1}" -f (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower(), $_.Name
          }
          $lines | Set-Content -Path release/SHA256SUMS.txt -Encoding ascii
          Get-Content release/SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: M2_GIT_DIFF ${{ github.ref_name }}
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
            release/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
