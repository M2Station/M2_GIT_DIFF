name: Dependabot auto-merge

# Enables auto-merge for low-risk Dependabot PRs (minor / patch bumps, and the
# grouped minor/patch dev-dep PRs). Branch protection still requires every
# status check to pass before GitHub actually merges — this only removes the
# manual click.
#
# Major bumps are intentionally NOT auto-merged: they can carry breaking changes
# and deserve a human smoke-test (e.g. React 19, Electron 43, Vite 8 did).

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    # Only act on PRs actually opened by Dependabot.
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for minor / patch updates
        if: steps.meta.outputs.update-type == 'version-update:semver-minor' || steps.meta.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
