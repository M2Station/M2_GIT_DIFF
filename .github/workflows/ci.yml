name: CI

# Verifies the same build steps that `npm run release` depends on
# (install -> rebuild native modules -> electron-builder dist) succeed
# in a clean environment. Does NOT tag or publish a release.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs on the same branch/PR (e.g. when Dependabot force-
# pushes a rebase, or a new commit lands) so we don't spend minutes finishing
# an already-outdated Windows build.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests (node)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  build:
    name: Build installer (windows)
    runs-on: windows-latest
    # Don't burn a Windows runner on the heavy installer build if the fast
    # unit-test job already failed.
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      # electron-builder downloads ~150 MB of tooling (electron binaries,
      # winCodeSign, NSIS) on every run. Cache it keyed on the lockfile so the
      # downloads only repeat when the pinned electron/electron-builder change.
      - name: Cache electron-builder downloads
        uses: actions/cache@v6
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-builder-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-builder-

      - name: Install dependencies
        run: npm ci

      - name: Build renderer (vite)
        run: npm run build

      - name: Rebuild native modules (better-sqlite3)
        run: npm run rebuild

      - name: Build installer (electron-builder)
        # On PRs, package x64 only for a fast packaging smoke test; build the
        # full x64 + arm64 set on pushes to main and manual runs.
        run: ${{ (github.event_name == 'pull_request') && 'npm run dist:x64' || 'npm run dist' }}
        env:
          # GitHub-hosted Windows runners have symlink privilege, so the
          # winCodeSign darwin-symlink extraction issue handled in
          # scripts/release.ps1 does not occur here. Skipping publish.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: M2_GIT_DIFF-installer
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
          if-no-files-found: error
          retention-days: 14
