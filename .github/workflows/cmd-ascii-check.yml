name: Batch File ASCII Check

# Guards against the cmd.exe multi-byte parsing bug: a .cmd/.bat file containing
# non-ASCII (e.g. 中文) bytes is silently corrupted by cmd.exe, which seeks by
# byte offset and splits commands mid-token. Keep batch files pure ASCII and put
# localized text / real logic in a .ps1 the wrapper calls.

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  cmd-ascii:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Need history so we can diff against the base commit.
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Determine changed files
        id: changed
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi
          # If BASE is empty or all-zeros (first push / new branch), check everything.
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "files=" >> "$GITHUB_OUTPUT"
            echo "Base is empty/new branch -> will check ALL tracked files."
          else
            FILES=$(git diff --name-only --diff-filter=ACMR "$BASE" "$HEAD" | tr '\n' ' ')
            echo "files=$FILES" >> "$GITHUB_OUTPUT"
            echo "Changed files: $FILES"
          fi

      - name: Verify batch files are pure ASCII
        run: node scripts/check-cmd-ascii.mjs ${{ steps.changed.outputs.files }}
